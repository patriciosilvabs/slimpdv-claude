server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # index.html e manifest sem cache
    location ~* ^/(index\.html|manifest\.webmanifest|sw\.js|registerSW\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets com hash — cache longo, 404 se não existir (nunca serve index.html)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Ícones e outros arquivos estáticos na raiz
    location ~* \.(ico|png|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA — todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
