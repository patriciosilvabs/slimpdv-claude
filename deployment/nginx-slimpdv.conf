# Nginx configuration for SlimPDV
# Location: /etc/nginx/sites-available/slimpdv
# Enable with: sudo ln -s /etc/nginx/sites-available/slimpdv /etc/nginx/sites-enabled/
# Test with: sudo nginx -t
# Reload with: sudo systemctl reload nginx

upstream frontend {
  server frontend:3000;
  keepalive 64;
}

upstream backend {
  server backend:5000;
  keepalive 64;
}

# HTTP redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name www.pdvslim.com.br pdvslim.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.pdvslim.com.br pdvslim.com.br;

  # SSL certificates (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/www.pdvslim.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.pdvslim.com.br/privkey.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Client upload size limit (20MB for POS receipts/images)
  client_max_body_size 20M;

  # Logging
  access_log /var/log/nginx/slimpdv-access.log combined;
  error_log /var/log/nginx/slimpdv-error.log warn;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/json application/javascript;

  # API Routes
  location /api/ {
    proxy_pass http://backend/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # Auth Routes
  location /auth/ {
    proxy_pass http://backend/auth/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # Frontend - SPA routing
  location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # SPA routing fallback
    error_page 404 =200 /index.html;
  }

  # Cache static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://frontend;
    proxy_cache_valid 200 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }
}

# Redirect from pdvslim.com.br to www.pdvslim.com.br (optional)
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name pdvslim.com.br;

  ssl_certificate /etc/letsencrypt/live/www.pdvslim.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.pdvslim.com.br/privkey.pem;

  return 301 https://www.pdvslim.com.br$request_uri;
}
