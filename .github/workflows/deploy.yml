name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          parts = str(d['version']).split('.')
          d['version'] = '{}.{}'.format(parts[0], int(parts[1])+1)
          with open('version.json','w') as f:
              json.dump(d, f)
          print(d['version'])
          " > /tmp/new_version.txt
          echo "VERSION=$(cat /tmp/new_version.txt)" >> $GITHUB_OUTPUT
          echo "Bumped to v$(cat /tmp/new_version.txt)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 72.61.25.92 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload files to VPS
        run: |
          rsync -az --delete src/ root@72.61.25.92:/var/www/slimpdv/src/ -e "ssh -i ~/.ssh/vps_key"
          rsync -az patches/ root@72.61.25.92:/var/www/slimpdv/patches/ -e "ssh -i ~/.ssh/vps_key"
          scp -i ~/.ssh/vps_key version.json root@72.61.25.92:/var/www/slimpdv/version.json

      - name: Run DB migrations
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 '
          echo "Running DB migrations..."
          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'gerente'"'"';" \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'supervisor'"'"';" \
            && echo "Role migrations done." || echo "Role migrations skipped."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_updated_at() RETURNS TRIGGER AS \$f\$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_updated_at ON orders;" \
            -c "CREATE TRIGGER orders_set_updated_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_updated_at();"
          echo "updated_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_order_ready_at() RETURNS TRIGGER AS \$f\$ BEGIN IF NEW.status = '"'"'ready'"'"' AND (OLD.status IS DISTINCT FROM '"'"'ready'"'"') THEN NEW.ready_at = NOW(); END IF; RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_ready_at ON orders;" \
            -c "CREATE TRIGGER orders_set_ready_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_order_ready_at();"
          echo "ready_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION check_order_completion(_order_id uuid) RETURNS boolean AS \$f\$ DECLARE v_tenant_id uuid; v_total int; v_ready int; BEGIN SELECT tenant_id INTO v_tenant_id FROM orders WHERE id = _order_id; IF v_tenant_id IS NULL THEN RETURN false; END IF; SELECT COUNT(*) INTO v_total FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id; SELECT COUNT(*) INTO v_ready FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id AND station_status = '"'"'ready'"'"'; IF v_total > 0 AND v_total = v_ready THEN UPDATE orders SET status = '"'"'ready'"'"', updated_at = NOW(), ready_at = NOW() WHERE id = _order_id AND tenant_id = v_tenant_id; RETURN true; END IF; RETURN false; END; \$f\$ LANGUAGE plpgsql;"
          echo "DB function/trigger migrations done."
          '

      - name: Build frontend + apply backend patches
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 bash << 'ENDSSH'
          set -e
          cd /var/www/slimpdv

          cp patches/patch_*.js /tmp/

          echo "Building frontend..."
          docker compose build frontend 2>&1 | tail -5
          docker compose up -d frontend 2>&1 | tail -3

          echo "Applying backend patches..."
          docker cp slimpdv-backend:/app/server.js /tmp/server_current.js
          rm -f /tmp/server_patched.js

          # Install web-push for push notifications (idempotent)
          docker exec slimpdv-backend npm install web-push --no-save 2>&1 | tail -3 || true

          # Generate VAPID keys once and persist (single-line node, no heredoc)
          if [ ! -f /var/www/slimpdv/vapid-keys.json ]; then
            docker exec slimpdv-backend node -e 'try{const w=require("web-push");process.stdout.write(JSON.stringify(w.generateVAPIDKeys()));}catch(e){const c=require("crypto");const{privateKey:pk,publicKey:pub}=c.generateKeyPairSync("ec",{namedCurve:"prime256v1"});const pd=pub.export({type:"spki",format:"der"});const rd=pk.export({type:"pkcs8",format:"der"});const b=x=>Buffer.from(x).toString("base64").replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");process.stdout.write(JSON.stringify({publicKey:b(pd.slice(27)),privateKey:b(rd.slice(-32))}));}' > /var/www/slimpdv/vapid-keys.json 2>/dev/null
            echo "VAPID keys generated"
          fi
          VAPID_PUB=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').publicKey)")
          VAPID_PRIV=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').privateKey)")
          printf 'services:\n  backend:\n    environment:\n      VAPID_PUBLIC_KEY: "%s"\n      VAPID_PRIVATE_KEY: "%s"\n      VAPID_EMAIL: "mailto:admin@pdvslim.com.br"\n' "$VAPID_PUB" "$VAPID_PRIV" > /var/www/slimpdv/docker-compose.vapid.yml
          echo "VAPID public key: ${VAPID_PUB:0:20}..."

          for patch in patch_cardapioweb_all patch_cardapioweb_delivery_only patch_kds_fix patch_ready_at patch_import_menu patch_fix_ai_tools patch_listar_pedidos_v2 patch_ai_chat patch_ai_expand patch_sounds_mappings patch_user_management patch_kds_device_actions patch_dispatch_checklist patch_kds_tenant_name patch_kds_tenant_info patch_push_notifications; do
            echo "  -> $patch"
            node /tmp/${patch}.js || { echo "PATCH ERROR: $patch"; exit 1; }
          done

          node --check /tmp/server_patched.js
          docker cp /tmp/server_patched.js slimpdv-backend:/app/server.js
          # Restart with VAPID env if override file exists
          if [ -f /var/www/slimpdv/docker-compose.vapid.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.vapid.yml up -d --no-build backend 2>&1 | tail -3
          else
            docker restart slimpdv-backend
          fi
          sleep 4

          docker ps --filter name=slimpdv-backend --format "Backend: {{.Status}}"

          echo "=== Backend logs (last 60 lines) ==="
          docker logs slimpdv-backend --tail 60 2>&1 || true
          echo "=== End backend logs ==="

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://pdvslim.com.br/api/functions/cardapioweb-webhook \
            -H "Content-Type: application/json" \
            -d '{"event_type":"PING","merchant_id":"20701","order_id":0}')
          echo "Webhook smoke test: HTTP $HTTP"
          ENDSSH

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet || git commit -m "chore: bump to v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push
