name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          parts = str(d['version']).split('.')
          d['version'] = '{}.{}'.format(parts[0], int(parts[1])+1)
          with open('version.json','w') as f:
              json.dump(d, f)
          print(d['version'])
          " > /tmp/new_version.txt
          echo "VERSION=$(cat /tmp/new_version.txt)" >> $GITHUB_OUTPUT
          echo "Bumped to v$(cat /tmp/new_version.txt)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 72.61.25.92 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload files to VPS
        run: |
          rsync -az --delete src/ root@72.61.25.92:/var/www/slimpdv/src/ -e "ssh -i ~/.ssh/vps_key"
          rsync -az patches/ root@72.61.25.92:/var/www/slimpdv/patches/ -e "ssh -i ~/.ssh/vps_key"
          scp -i ~/.ssh/vps_key version.json root@72.61.25.92:/var/www/slimpdv/version.json

      - name: Run DB migrations
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 '
          echo "Running DB migrations..."
          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'gerente'"'"';" \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'supervisor'"'"';" \
            && echo "Role migrations done." || echo "Role migrations skipped."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_updated_at() RETURNS TRIGGER AS \$f\$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_updated_at ON orders;" \
            -c "CREATE TRIGGER orders_set_updated_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_updated_at();"
          echo "updated_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_order_ready_at() RETURNS TRIGGER AS \$f\$ BEGIN IF NEW.status = '"'"'ready'"'"' AND (OLD.status IS DISTINCT FROM '"'"'ready'"'"') THEN NEW.ready_at = NOW(); END IF; RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_ready_at ON orders;" \
            -c "CREATE TRIGGER orders_set_ready_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_order_ready_at();"
          echo "ready_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION check_order_completion(_order_id uuid) RETURNS boolean AS \$f\$ DECLARE v_tenant_id uuid; v_total int; v_ready int; BEGIN SELECT tenant_id INTO v_tenant_id FROM orders WHERE id = _order_id; IF v_tenant_id IS NULL THEN RETURN false; END IF; SELECT COUNT(*) INTO v_total FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id; SELECT COUNT(*) INTO v_ready FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id AND station_status = '"'"'ready'"'"'; IF v_total > 0 AND v_total = v_ready THEN UPDATE orders SET status = '"'"'ready'"'"', updated_at = NOW(), ready_at = NOW() WHERE id = _order_id AND tenant_id = v_tenant_id; RETURN true; END IF; RETURN false; END; \$f\$ LANGUAGE plpgsql;"
          echo "DB function/trigger migrations done."
          '

      - name: Build frontend + apply backend patches
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 bash << 'ENDSSH'
          set -e
          cd /var/www/slimpdv

          cp patches/patch_*.js /tmp/

          # ── SAVE current server.js to host BEFORE any container recreation ──────────
          # This preserves the large assembled server.js that the entrypoint builds at
          # startup. Container recreation discards the writable layer, losing this file.
          echo "=== Saving current server.js to host for persistence ==="
          CURRENT_SIZE=$(docker exec slimpdv-backend wc -c < /app/server.js 2>/dev/null || echo 0)
          echo "Current /app/server.js size: $CURRENT_SIZE bytes"
          if [ "$CURRENT_SIZE" -gt 50000 ]; then
            docker cp slimpdv-backend:/app/server.js /var/www/slimpdv/server_base.js
            echo "Saved large server.js ($CURRENT_SIZE bytes) → /var/www/slimpdv/server_base.js"
          else
            echo "server.js is small ($CURRENT_SIZE bytes) — not saving (may not have assembled yet)"
          fi

          # ── GENERATE VAPID KEYS (before any container ops) ───────────────────────
          if [ ! -f /var/www/slimpdv/vapid-keys.json ]; then
            node -e 'try{const c=require("crypto");const{privateKey:pk,publicKey:pub}=c.generateKeyPairSync("ec",{namedCurve:"prime256v1"});const pd=pub.export({type:"spki",format:"der"});const rd=pk.export({type:"pkcs8",format:"der"});const b=x=>Buffer.from(x).toString("base64").replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");process.stdout.write(JSON.stringify({publicKey:b(pd.slice(27)),privateKey:b(rd.slice(-32))}))}catch(e){process.stdout.write(JSON.stringify({publicKey:"",privateKey:""}))}' > /var/www/slimpdv/vapid-keys.json
            echo "VAPID keys generated"
          fi
          VAPID_PUB=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').publicKey)")
          VAPID_PRIV=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').privateKey)")
          printf 'services:\n  backend:\n    environment:\n      VAPID_PUBLIC_KEY: "%s"\n      VAPID_PRIVATE_KEY: "%s"\n      VAPID_EMAIL: "mailto:admin@pdvslim.com.br"\n' "$VAPID_PUB" "$VAPID_PRIV" > /var/www/slimpdv/docker-compose.vapid.yml
          echo "VAPID public key: ${VAPID_PUB:0:20}..."

          # ── BUILD IMAGES ──────────────────────────────────────────────────────────
          echo "Building backend image (Node.js 20)..."
          docker compose build backend 2>&1 | tail -5

          echo "Building frontend image..."
          docker compose build frontend 2>&1 | tail -5

          # ── RECREATE BACKEND with new image + VAPID env ───────────────────────────
          echo "Recreating backend with new image + VAPID..."
          docker compose -f docker-compose.yml -f docker-compose.vapid.yml up -d backend 2>&1 | tail -3
          sleep 3
          docker exec slimpdv-backend node --version 2>&1 || true

          # ── PATCH SERVER.JS ───────────────────────────────────────────────────────
          echo "Applying backend patches..."

          # Diagnose container entry point BEFORE patching
          echo "=== Container entry point investigation ==="
          docker inspect slimpdv-backend --format 'CMD: {{json .Config.Cmd}} | Entrypoint: {{json .Config.Entrypoint}}' 2>/dev/null || true
          docker exec slimpdv-backend ls /app/ 2>/dev/null | head -30 || true
          docker exec slimpdv-backend ls /app/dist/ 2>/dev/null && echo "(dist/ exists)" || echo "(no dist/ dir)"

          # ── Show entrypoint script so we know what rebuilds server.js ───────────────
          echo "=== docker-entrypoint.sh content ==="
          ENTRYPOINT_PATH=$(docker exec slimpdv-backend sh -c "which docker-entrypoint.sh 2>/dev/null || find /usr/local/bin /docker-entrypoint.sh / -name docker-entrypoint.sh -maxdepth 4 2>/dev/null | head -1" 2>/dev/null || echo "")
          if [ -n "$ENTRYPOINT_PATH" ]; then
            docker exec slimpdv-backend cat "$ENTRYPOINT_PATH" 2>/dev/null || true
          else
            echo "(entrypoint script not found at known paths)"
            docker exec slimpdv-backend sh -c "find / -name docker-entrypoint.sh -maxdepth 5 2>/dev/null | head -3" 2>/dev/null || true
          fi
          echo "=== /app/server_original.js first 30 lines ==="
          docker exec slimpdv-backend head -30 /app/server_original.js 2>/dev/null || true
          echo "=== /app/src/ contents ==="
          docker exec slimpdv-backend ls /app/src/ 2>/dev/null || true

          # ── Select source for patching ────────────────────────────────────────────
          # Priority: 1) /var/www/slimpdv/server_base.js (host-persisted large file)
          #           2) /app/server.js (large assembled file in running container)
          #           3) /app/server_original.js (fallback — likely small template)
          rm -f /tmp/server_patched.js
          BASE_SIZE=$(wc -c < /var/www/slimpdv/server_base.js 2>/dev/null || echo 0)
          SERVER_SIZE=$(docker exec slimpdv-backend wc -c < /app/server.js 2>/dev/null || echo 0)
          if [ "$BASE_SIZE" -gt 50000 ]; then
            echo "Source: /var/www/slimpdv/server_base.js (host-persisted, $BASE_SIZE bytes)"
            cp /var/www/slimpdv/server_base.js /tmp/server_current.js
          elif [ "$SERVER_SIZE" -gt 50000 ]; then
            echo "Source: /app/server.js (container, $SERVER_SIZE bytes)"
            docker cp slimpdv-backend:/app/server.js /tmp/server_current.js
          else
            echo "WARN: No large server.js found (base=$BASE_SIZE, container=$SERVER_SIZE) — using container server.js"
            docker cp slimpdv-backend:/app/server.js /tmp/server_current.js
          fi

          # Check that the source has the expected patch anchors
          echo "Source file size: $(wc -c < /tmp/server_current.js) bytes"
          grep -c "app.get('/api/health'" /tmp/server_current.js 2>/dev/null && echo "Health anchor found" || echo "WARN: Health anchor NOT found — patches may skip"

          # Install web-push inside the new container
          docker exec slimpdv-backend npm install web-push --no-save 2>&1 | tail -3 || true

          # Show module system so we know ESM vs CJS
          docker exec slimpdv-backend node -e "const fs=require('fs'); try{const p=JSON.parse(fs.readFileSync('/app/package.json','utf8')); console.log('[patch] package.json type:', p.type||'(commonjs)')}catch(e){console.log('[patch] package.json:', e.message)}" 2>/dev/null || true

          echo "VPS host Node.js: $(node --version 2>/dev/null || echo unknown)"

          for patch in patch_cardapioweb_all patch_cardapioweb_delivery_only patch_kds_fix patch_ready_at patch_import_menu patch_fix_ai_tools patch_listar_pedidos_v2 patch_ai_chat patch_ai_expand patch_sounds_mappings patch_user_management patch_kds_device_actions patch_dispatch_checklist patch_kds_tenant_name patch_kds_tenant_info patch_push_notifications; do
            echo "  -> $patch"
            node /tmp/${patch}.js || { echo "PATCH ERROR: $patch"; exit 1; }
          done

          # Syntax check using container Node.js 20 (host may be older)
          echo "Syntax checking with container Node.js..."
          docker cp /tmp/server_patched.js slimpdv-backend:/tmp/server_syntax_check.js
          docker exec slimpdv-backend node --check /tmp/server_syntax_check.js && echo "Syntax OK" || { echo "SYNTAX ERROR in patched file"; exit 1; }

          # ── COPY patched server.js ───────────────────────────────────────────────
          echo "Installing patched server.js..."
          docker cp /tmp/server_patched.js slimpdv-backend:/app/server.js
          # NOTE: do NOT overwrite server_original.js — it is a small template that the
          # entrypoint uses as a header, concatenating src/ routes after it. Replacing it
          # with the full patched server would duplicate all routes on next restart.
          echo "Patched server.js installed to /app/server.js only (server_original.js left unchanged)"
          if docker exec slimpdv-backend test -d /app/dist 2>/dev/null; then
            docker cp /tmp/server_patched.js slimpdv-backend:/app/dist/server.js
            echo "Also installed to /app/dist/server.js"
          fi
          # Save patched result to host for next deploy (survives container recreation)
          cp /tmp/server_patched.js /var/www/slimpdv/server_base.js
          echo "Saved patched server.js to /var/www/slimpdv/server_base.js for next deploy"

          # ── Neutralize entrypoint so docker restart uses patched server.js ─────────
          # The entrypoint rebuilds server.js from server_original.js + src/ on every
          # container start, discarding all our patches. Replace it with a simple passthrough
          # (exec "$@") so that CMD ["node","server.js"] runs the patched file directly.
          # We try all common entrypoint paths.
          echo "=== Neutralizing docker-entrypoint.sh ==="
          NEUTRALIZED=0
          for EP_PATH in /docker-entrypoint.sh /usr/local/bin/docker-entrypoint.sh /entrypoint.sh /app/entrypoint.sh /usr/local/bin/entrypoint.sh; do
            if docker exec slimpdv-backend test -f "$EP_PATH" 2>/dev/null; then
              echo "Found entrypoint at $EP_PATH — showing content:"
              docker exec slimpdv-backend cat "$EP_PATH" 2>/dev/null || true
              echo "Replacing with passthrough..."
              docker exec slimpdv-backend sh -c "printf '#!/bin/sh\nexec \"\$@\"\n' > $EP_PATH && chmod +x $EP_PATH"
              echo "Entrypoint at $EP_PATH replaced. docker restart will now exec node server.js directly."
              NEUTRALIZED=1
              break
            fi
          done
          if [ "$NEUTRALIZED" = "0" ]; then
            echo "WARNING: No entrypoint script found at common paths — docker restart may rebuild server.js"
            echo "Searching for entrypoint script..."
            docker exec slimpdv-backend sh -c "find / -maxdepth 5 -name '*.sh' 2>/dev/null | xargs grep -l 'server_original\|cp.*server' 2>/dev/null | head -5" || true
          fi

          # Verify the patched file is in the container before restart
          docker exec slimpdv-backend grep -c "push/vapid" /app/server.js 2>/dev/null && echo "VERIFIED: push routes in /app/server.js" || echo "WARN: push routes not found in /app/server.js"
          docker exec slimpdv-backend grep -c "push/vapid" /app/dist/server.js 2>/dev/null && echo "VERIFIED: push routes in /app/dist/server.js" || true

          # ── Inject vapidGuard into server_original.js (survives entrypoint reassembly) ──
          # The entrypoint concatenates server_original.js + src/ routes into server.js on
          # every container start. By injecting a minimal VAPID guard into the template file
          # itself, the guard is present even when the entrypoint rebuilds server.js.
          echo "=== Injecting vapidGuard into server_original.js ==="
          if docker exec slimpdv-backend grep -q "_vapidGuard" /app/server_original.js 2>/dev/null; then
            ORIG_HAS_GUARD=1
          else
            ORIG_HAS_GUARD=0
          fi
          echo "server_original.js has vapidGuard: $ORIG_HAS_GUARD"
          if [ "$ORIG_HAS_GUARD" = "0" ]; then
            docker exec slimpdv-backend node -e "
              const fs = require('fs');
              const path = '/app/server_original.js';
              let code;
              try { code = fs.readFileSync(path, 'utf8'); } catch(e) { console.log('Cannot read ' + path + ': ' + e.message); process.exit(0); }
              console.log('server_original.js size:', code.length, 'bytes');
              console.log('First 200 chars:', JSON.stringify(code.slice(0, 200)));
              if (code.includes('_vapidGuard')) { console.log('vapidGuard already present'); process.exit(0); }
              const guard = '\n// VAPID guard — injected by deploy\napp.use(function _vapidGuard(req, res, next) {\n  if (req.method === \"GET\" && (req.path === \"/api/push/vapid-public-key\" || req.path === \"/push/vapid-public-key\")) {\n    return res.json({ publicKey: process.env.VAPID_PUBLIC_KEY || null });\n  }\n  next();\n});\n';
              const anchors = ['const app = express()', 'var app = express()', 'let app = express()', 'app = express()'];
              let pos = -1;
              let usedAnchor = '';
              for (const a of anchors) {
                const idx = code.indexOf(a);
                if (idx !== -1) { pos = idx + a.length; usedAnchor = a; break; }
              }
              if (pos === -1) {
                console.log('No express() anchor found — appending guard to end of file');
                code = code + guard;
              } else {
                console.log('Anchor found: ' + JSON.stringify(usedAnchor));
                code = code.slice(0, pos) + guard + code.slice(pos);
              }
              fs.writeFileSync(path, code);
              console.log('vapidGuard injected into server_original.js (' + code.length + ' bytes)');
            " 2>&1 || echo "vapidGuard injection into server_original.js failed"
            # Verify injection
            docker exec slimpdv-backend grep -c "_vapidGuard" /app/server_original.js 2>/dev/null && echo "CONFIRMED: vapidGuard in server_original.js" || echo "WARN: vapidGuard NOT in server_original.js"
          else
            echo "vapidGuard already present in server_original.js — skipping injection"
          fi

          docker restart slimpdv-backend
          sleep 6

          # ── CRITICAL: check server.js state AFTER restart ─────────────────────────
          echo "=== server.js state AFTER docker restart ==="
          POST_SIZE=$(docker exec slimpdv-backend wc -c < /app/server.js 2>/dev/null || echo 0)
          if docker exec slimpdv-backend grep -q "push/vapid" /app/server.js 2>/dev/null; then
            POST_PUSH=1
          else
            POST_PUSH=0
          fi
          echo "server.js size after restart: $POST_SIZE bytes"
          echo "push/vapid occurrences after restart: $POST_PUSH"
          echo "server.js first 3 lines after restart:"
          docker exec slimpdv-backend head -3 /app/server.js 2>/dev/null || true
          if [ "$POST_PUSH" = "0" ]; then
            echo "CONFIRMED: entrypoint rebuilt server.js and erased push routes after restart"
            echo "server_original.js content (first 30 lines):"
            docker exec slimpdv-backend head -30 /app/server_original.js 2>/dev/null || true
          else
            echo "GOOD: push routes survived restart"
          fi

          # ── NGINX: serve VAPID key directly as static response ───────────────────
          echo "=== Configuring nginx VAPID static response ==="

          # First: try Docker nginx-proxy containers (check multiple possible names)
          NGINX_DONE=0
          for NGINX_CTR in slimpdv-nginx-proxy nginx-proxy nginx slimpdv_nginx slimpdv-nginx; do
            if docker inspect "$NGINX_CTR" > /dev/null 2>&1; then
              echo "Found Docker nginx container: $NGINX_CTR"
              docker cp /var/www/slimpdv/patches/patch_nginx_vapid.sh "$NGINX_CTR":/tmp/patch_nginx_vapid.sh 2>/dev/null && \
                docker exec "$NGINX_CTR" sh /tmp/patch_nginx_vapid.sh "$VAPID_PUB" 2>&1 && \
                docker exec "$NGINX_CTR" nginx -t 2>&1 && \
                docker exec "$NGINX_CTR" nginx -s reload 2>/dev/null && \
                echo "Docker nginx VAPID static config applied to $NGINX_CTR" && \
                NGINX_DONE=1 && break || \
                echo "Docker nginx patch failed on $NGINX_CTR — trying next"
            fi
          done

          # Second: try host nginx if no Docker nginx worked
          if [ "$NGINX_DONE" = "0" ]; then
            echo "No Docker nginx found — checking host nginx..."
            docker ps --format "{{.Names}}: {{.Image}}: {{.Ports}}" 2>/dev/null | head -20 || true
            if command -v nginx > /dev/null 2>&1 || systemctl is-active nginx > /dev/null 2>&1; then
              echo "Host nginx is running"
              # Find the config file for pdvslim.com.br
              NGINX_CONF=""
              for f in /etc/nginx/sites-enabled/pdvslim* /etc/nginx/sites-enabled/default /etc/nginx/conf.d/pdvslim* /etc/nginx/conf.d/default.conf; do
                if [ -f "$f" ]; then NGINX_CONF="$f"; echo "Host nginx config: $f"; break; fi
              done
              if [ -n "$NGINX_CONF" ]; then
                echo "Applying VAPID patch to host nginx config: $NGINX_CONF"
                sh /var/www/slimpdv/patches/patch_nginx_vapid.sh "$VAPID_PUB" 2>&1 && \
                  nginx -t 2>&1 && nginx -s reload 2>/dev/null && \
                  echo "Host nginx VAPID static config applied" && NGINX_DONE=1 || \
                  echo "Host nginx patch failed"
              else
                echo "WARN: No nginx config file found for pdvslim.com.br"
                echo "Host nginx config files:"
                ls /etc/nginx/sites-enabled/ 2>/dev/null || true
                ls /etc/nginx/conf.d/ 2>/dev/null || true
              fi
            else
              echo "WARN: No nginx found (Docker or host) — skipping nginx VAPID patch"
              echo "All running Docker containers:"
              docker ps --format "{{.Names}}: {{.Image}}: {{.Ports}}" 2>/dev/null || true
            fi
          fi

          # ── POST-RESTART DIAGNOSTICS ─────────────────────────────────────────────
          echo "=== Backend state immediately after restart ==="
          docker inspect slimpdv-backend --format 'Status: {{.State.Status}} | ExitCode: {{.State.ExitCode}} | Restarting: {{.State.Restarting}}' 2>/dev/null || true
          echo "--- Backend logs (last 30 lines) ---"
          docker logs slimpdv-backend --tail 30 2>&1 || true
          echo "--- Direct curl with response body ---"
          curl -s "http://localhost:5000/api/push/vapid-public-key" 2>/dev/null || echo "(no response from backend)"
          curl -s "http://localhost:5000/api/health" 2>/dev/null || echo "(health also unreachable)"
          VAPID_DIRECT=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/push/vapid-public-key 2>/dev/null || echo "000")
          VAPID_BODY=$(curl -s "http://localhost:5000/api/push/vapid-public-key" 2>/dev/null || echo "unreachable")
          echo "Direct VAPID test (backend port 5000): HTTP $VAPID_DIRECT"
          echo "VAPID response body: $VAPID_BODY"

          # ── START FRONTEND ────────────────────────────────────────────────────────
          echo "Starting frontend..."
          docker compose up -d frontend 2>&1 | tail -3
          sleep 3

          # ── Write deploy diagnostic to frontend static dir (accessible via HTTP) ──
          DIAG_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if docker exec slimpdv-backend grep -q "_vapidGuard" /app/server_original.js 2>/dev/null; then DIAG_ORIG_GUARD=1; else DIAG_ORIG_GUARD=0; fi
          if docker exec slimpdv-backend grep -q "push/vapid" /app/server.js 2>/dev/null; then DIAG_POST_PUSH=1; else DIAG_POST_PUSH=0; fi
          printf '{"ts":"%s","vapid_http":"%s","vapid_body":%s,"post_push_count":"%s","orig_guard_count":"%s","server_size":"%s"}\n' \
            "$DIAG_TS" "$VAPID_DIRECT" "$(echo $VAPID_BODY | head -c 300)" "$DIAG_POST_PUSH" "$DIAG_ORIG_GUARD" "$POST_SIZE" \
            > /tmp/vapid-diag.json 2>/dev/null || true
          docker cp /tmp/vapid-diag.json slimpdv-frontend:/app/dist/vapid-diag.json 2>/dev/null && \
            echo "Diagnostic written to /app/dist/vapid-diag.json (accessible at /vapid-diag.json)" || \
            echo "Could not write diagnostic to frontend container"

          # Reload nginx proxy (Docker or host)
          echo "Reloading nginx proxy..."
          NGINX_RELOADED=0
          for NGINX_CTR in slimpdv-nginx-proxy nginx-proxy nginx slimpdv_nginx slimpdv-nginx; do
            if docker inspect "$NGINX_CTR" > /dev/null 2>&1; then
              docker exec "$NGINX_CTR" nginx -s reload 2>/dev/null && NGINX_RELOADED=1 && echo "Reloaded Docker nginx: $NGINX_CTR" && break
            fi
          done
          if [ "$NGINX_RELOADED" = "0" ]; then
            nginx -s reload 2>/dev/null && echo "Reloaded host nginx" || echo "nginx reload skipped (not found)"
          fi
          sleep 2

          docker ps --filter name=slimpdv --format "{{.Names}}: {{.Status}}"

          echo "=== Backend logs (last 40 lines) ==="
          docker logs slimpdv-backend --tail 40 2>&1 || true
          echo "=== End backend logs ==="

          echo "=== Verify patched routes active in container ==="
          docker exec slimpdv-backend grep -c "push/vapid" /app/server.js 2>/dev/null || echo "check /app/server.js failed"
          docker exec slimpdv-backend grep -c "push/vapid" /app/dist/server.js 2>/dev/null || echo "check /app/dist/server.js failed (may not exist)"

          echo "=== Frontend logs (last 10 lines) ==="
          docker logs slimpdv-frontend --tail 10 2>&1 || true
          echo "=== End frontend logs ==="

          # Ensure frontend is running (restart if exited)
          FRONTEND_STATUS=$(docker inspect -f '{{.State.Status}}' slimpdv-frontend 2>/dev/null || echo "missing")
          echo "Frontend container status: $FRONTEND_STATUS"
          if [ "$FRONTEND_STATUS" != "running" ]; then
            echo "Frontend not running — restarting..."
            docker compose up -d frontend 2>&1 | tail -3
            sleep 3
          fi

          # === DIAGNOSTICS ===
          echo "=== Nginx proxy config ==="
          docker exec slimpdv-nginx-proxy cat /etc/nginx/nginx.conf 2>/dev/null | head -20 || true
          docker exec slimpdv-nginx-proxy ls /etc/nginx/conf.d/ 2>/dev/null || true
          docker exec slimpdv-nginx-proxy cat /etc/nginx/conf.d/default.conf 2>/dev/null || true

          echo "=== Direct backend test (internal port 5000) ==="
          curl -s -o /dev/null -w "GET /push/vapid-public-key direct: HTTP %{http_code}\n" http://localhost:5000/push/vapid-public-key || true
          curl -s -o /dev/null -w "GET /api/push/vapid-public-key direct: HTTP %{http_code}\n" http://localhost:5000/api/push/vapid-public-key || true
          curl -s "http://localhost:5000/push/vapid-public-key" 2>/dev/null || true

          echo "=== Push routes in patched server ==="
          grep -n "push/\|vapid" /tmp/server_patched.js 2>/dev/null || true

          # === END DIAGNOSTICS ===

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://pdvslim.com.br/api/functions/cardapioweb-webhook \
            -H "Content-Type: application/json" \
            -d '{"event_type":"PING","merchant_id":"20701","order_id":0}')
          echo "Webhook smoke test: HTTP $HTTP"

          FRONT=$(curl -s -o /dev/null -w "%{http_code}" https://pdvslim.com.br/)
          echo "Frontend smoke test: HTTP $FRONT"

          VAPID=$(curl -s -o /dev/null -w "%{http_code}" https://pdvslim.com.br/api/push/vapid-public-key)
          echo "VAPID smoke test via nginx: HTTP $VAPID"
          ENDSSH

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet || git commit -m "chore: bump to v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push
