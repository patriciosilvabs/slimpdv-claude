name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          parts = str(d['version']).split('.')
          d['version'] = '{}.{}'.format(parts[0], int(parts[1])+1)
          with open('version.json','w') as f:
              json.dump(d, f)
          print(d['version'])
          " > /tmp/new_version.txt
          echo "VERSION=$(cat /tmp/new_version.txt)" >> $GITHUB_OUTPUT
          echo "Bumped to v$(cat /tmp/new_version.txt)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 72.61.25.92 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload files to VPS
        run: |
          rsync -az --delete src/ root@72.61.25.92:/var/www/slimpdv/src/ -e "ssh -i ~/.ssh/vps_key"
          rsync -az patches/ root@72.61.25.92:/var/www/slimpdv/patches/ -e "ssh -i ~/.ssh/vps_key"
          rsync -az backend/src/ root@72.61.25.92:/var/www/slimpdv/backend/src/ -e "ssh -i ~/.ssh/vps_key"
          scp -i ~/.ssh/vps_key version.json root@72.61.25.92:/var/www/slimpdv/version.json

      - name: Patch PM2 server — CardapioWeb sync-status route
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 'node -e "
          const fs = require(\"fs\");
          const path = require(\"path\");

          // Find the running server.js
          const candidates = [
            \"/var/www/slimpdv/backend/server.js\",
            \"/var/www/slimpdv/server.js\",
          ];
          let serverPath = null;
          for (const p of candidates) {
            if (fs.existsSync(p)) { serverPath = p; break; }
          }
          if (!serverPath) { console.log(\"server.js not found — skipping patch\"); process.exit(0); }

          let code = fs.readFileSync(serverPath, \"utf8\");

          // Idempotency check
          if (code.includes(\"[SyncStatus] Called:\")) {
            console.log(\"CardapioWeb sync-status patch already applied — skipping\");
            process.exit(0);
          }

          const CW_SYNC_ROUTE = \`
// ── CardapioWeb sync-status (PATCH: added by deploy) ──────────────────────
app.post(\\\"/api/functions/cardapioweb-sync-status\\\", optionalAuth || authMiddleware, async (req, res) => {
  try {
    const { order_id, new_status, cancellation_reason } = req.body || {};
    console.log(\\\"[SyncStatus] Called: order_id=\\\" + order_id + \\\" new_status=\\\" + new_status);
    if (!order_id || !new_status) return res.status(400).json({ error: \\\"Missing order_id or new_status\\\" });
    const orderRes = await pool.query(\\\"SELECT id, external_source, external_order_id, tenant_id FROM orders WHERE id=\\\$1\\\", [order_id]);
    const order = orderRes.rows[0];
    if (!order) return res.status(404).json({ error: \\\"Order not found\\\" });
    if (order.external_source !== \\\"cardapioweb\\\") return res.json({ success: true, message: \\\"Not a CardapioWeb order\\\" });
    if (!order.external_order_id) return res.json({ success: true, message: \\\"No external order ID\\\" });
    const intRes = await pool.query(\\\"SELECT api_token FROM cardapioweb_integrations WHERE tenant_id=\\\$1 AND is_active=true LIMIT 1\\\", [order.tenant_id]);
    const apiToken = intRes.rows[0] && intRes.rows[0].api_token;
    if (!apiToken) return res.status(400).json({ error: \\\"Integration not configured\\\" });
    const endpointMap = { preparing: \\\"confirm\\\", ready: \\\"ready\\\", delivered: \\\"finalize\\\", cancelled: \\\"cancel\\\" };
    const endpoint = endpointMap[new_status];
    if (!endpoint) return res.json({ success: true, message: \\\"No sync needed for this status\\\" });
    const apiUrl = \\\"https://integracao.cardapioweb.com/api/partner/v1/orders/\\\" + order.external_order_id + \\\"/\\\" + endpoint;
    console.log(\\\"[SyncStatus] Calling: \\\" + apiUrl);
    const body = (endpoint === \\\"cancel\\\" && cancellation_reason) ? JSON.stringify({ cancellation_reason }) : undefined;
    const apiResp = await fetch(apiUrl, { method: \\\"POST\\\", headers: { \\\"X-API-KEY\\\": apiToken, \\\"Accept\\\": \\\"application/json\\\", \\\"Content-Type\\\": \\\"application/json\\\" }, body });
    const respText = await apiResp.text();
    console.log(\\\"[SyncStatus] CardapioWeb response: \\\" + apiResp.status + \\\" \\\" + respText);
    if (!apiResp.ok) return res.json({ success: false, message: \\\"CardapioWeb returned \\\" + apiResp.status, error: respText });
    return res.json({ success: true });
  } catch (err) { console.error(\\\"[SyncStatus] Error:\\\", err.message); return res.status(500).json({ error: err.message }); }
});

// ── CardapioWeb keep-alive + polling (PATCH: added by deploy) ──────────────
const _cwSyncedReady = new Set();
async function pollAndSyncCW() {
  try {
    const rows = await pool.query(\\\"SELECT o.id, o.tenant_id FROM orders o WHERE o.external_source=\\\\'cardapioweb\\\\' AND o.status=\\\\'ready\\\\' AND o.ready_at > NOW() - INTERVAL \\\\'5 minutes\\\\'\\\");
    for (const row of rows.rows) {
      if (_cwSyncedReady.has(row.id)) continue;
      _cwSyncedReady.add(row.id);
      const intRes = await pool.query(\\\"SELECT api_token FROM cardapioweb_integrations WHERE tenant_id=\\\$1 AND is_active=true LIMIT 1\\\", [row.tenant_id]);
      const apiToken = intRes.rows[0] && intRes.rows[0].api_token;
      if (!apiToken) continue;
      const ordRes = await pool.query(\\\"SELECT external_order_id FROM orders WHERE id=\\\$1\\\", [row.id]);
      const extId = ordRes.rows[0] && ordRes.rows[0].external_order_id;
      if (!extId) continue;
      fetch(\\\"https://integracao.cardapioweb.com/api/partner/v1/orders/\\\" + extId + \\\"/ready\\\", { method: \\\"POST\\\", headers: { \\\"X-API-KEY\\\": apiToken, \\\"Accept\\\": \\\"application/json\\\", \\\"Content-Type\\\": \\\"application/json\\\" } })
        .then(r => console.log(\\\"[Poll-CW] Synced order \\\" + row.id + \\\" status=\\\" + r.status))
        .catch(e => console.error(\\\"[Poll-CW] Failed:\\\" + e.message));
    }
    if (_cwSyncedReady.size > 500) _cwSyncedReady.clear();
  } catch(e) { if (!String(e.message).includes(\\\"does not exist\\\")) console.error(\\\"[Poll-CW]\\\", e.message); }
}
async function keepAliveCW() {
  try {
    const rows = await pool.query(\\\"SELECT api_token FROM cardapioweb_integrations WHERE is_active=true\\\");
    for (const r of rows.rows) {
      fetch(\\\"https://integracao.cardapioweb.com/api/partner/v1/merchant\\\", { headers: { \\\"X-API-KEY\\\": r.api_token, \\\"Accept\\\": \\\"application/json\\\" } })
        .then(x => console.log(\\\"[KeepAlive-CW] ping \\\" + x.status)).catch(()=>{});
    }
  } catch(e) {}
}
if (!global._cwPollStarted) {
  global._cwPollStarted = true;
  setInterval(pollAndSyncCW, 30000);
  setInterval(keepAliveCW, 20 * 60000);
  setTimeout(pollAndSyncCW, 3000);
  setTimeout(keepAliveCW, 5000);
}
\`;

          // Insert before the first app.listen or app.get(\"/health\") or at the end of the file
          const anchors = [\"app.listen(\", \"server.listen(\", \"// Start server\", \"module.exports\"];
          let inserted = false;
          for (const anchor of anchors) {
            const idx = code.indexOf(anchor);
            if (idx !== -1) {
              code = code.slice(0, idx) + CW_SYNC_ROUTE + \"\\n\" + code.slice(idx);
              inserted = true;
              break;
            }
          }
          if (!inserted) { code = code + \"\\n\" + CW_SYNC_ROUTE; }

          fs.writeFileSync(serverPath, code);
          console.log(\"CardapioWeb sync-status patch applied to \" + serverPath);
          "'
          # Reload PM2 so the patch takes effect
          ssh -i ~/.ssh/vps_key root@72.61.25.92 'pm2 reload slimpdv 2>/dev/null || pm2 reload all 2>/dev/null || echo "PM2 reload skipped"'

      - name: Run DB migrations
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 '
          echo "Running DB migrations..."
          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'gerente'"'"';" \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'supervisor'"'"';" \
            && echo "Role migrations done." || echo "Role migrations skipped."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_updated_at() RETURNS TRIGGER AS \$f\$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_updated_at ON orders;" \
            -c "CREATE TRIGGER orders_set_updated_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_updated_at();"
          echo "updated_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_order_ready_at() RETURNS TRIGGER AS \$f\$ BEGIN IF NEW.status = '"'"'ready'"'"' AND (OLD.status IS DISTINCT FROM '"'"'ready'"'"') THEN NEW.ready_at = NOW(); END IF; RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_ready_at ON orders;" \
            -c "CREATE TRIGGER orders_set_ready_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_order_ready_at();"
          echo "ready_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION check_order_completion(_order_id uuid) RETURNS boolean AS \$f\$ DECLARE v_tenant_id uuid; v_total int; v_ready int; BEGIN SELECT tenant_id INTO v_tenant_id FROM orders WHERE id = _order_id; IF v_tenant_id IS NULL THEN RETURN false; END IF; SELECT COUNT(*) INTO v_total FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id; SELECT COUNT(*) INTO v_ready FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id AND station_status = '"'"'ready'"'"'; IF v_total > 0 AND v_total = v_ready THEN UPDATE orders SET status = '"'"'ready'"'"', updated_at = NOW(), ready_at = NOW() WHERE id = _order_id AND tenant_id = v_tenant_id; RETURN true; END IF; RETURN false; END; \$f\$ LANGUAGE plpgsql;"
          echo "DB function/trigger migrations done."
          '

      - name: Build and deploy
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 bash << 'ENDSSH'
          set -e
          cd /var/www/slimpdv

          # ── GENERATE VAPID KEYS ──────────────────────────────────────────────────
          if [ ! -f /var/www/slimpdv/vapid-keys.json ]; then
            node -e 'try{const c=require("crypto");const{privateKey:pk,publicKey:pub}=c.generateKeyPairSync("ec",{namedCurve:"prime256v1"});const pd=pub.export({type:"spki",format:"der"});const rd=pk.export({type:"pkcs8",format:"der"});const b=x=>Buffer.from(x).toString("base64").replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");process.stdout.write(JSON.stringify({publicKey:b(pd.slice(27)),privateKey:b(rd.slice(-32))}))}catch(e){process.stdout.write(JSON.stringify({publicKey:"",privateKey:""}))}' > /var/www/slimpdv/vapid-keys.json
            echo "VAPID keys generated"
          fi
          VAPID_PUB=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').publicKey)")
          VAPID_PRIV=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').privateKey)")
          echo "VAPID public key: ${VAPID_PUB:0:20}..."

          # ── GENERATE docker-compose.vapid.yml (env vars only — no volume hacks) ──
          printf 'services:\n  backend:\n    environment:\n      VAPID_PUBLIC_KEY: "%s"\n      VAPID_PRIVATE_KEY: "%s"\n      VAPID_EMAIL: "mailto:admin@pdvslim.com.br"\n' \
            "$VAPID_PUB" "$VAPID_PRIV" > /var/www/slimpdv/docker-compose.vapid.yml

          # ── BUILD IMAGES ─────────────────────────────────────────────────────────
          echo "=== Building backend image ==="
          docker compose build --no-cache backend 2>&1 | tail -10

          echo "=== Building frontend image ==="
          docker compose build frontend 2>&1 | tail -5

          # ── RECREATE BACKEND (TypeScript server with VAPID built-in) ─────────────
          echo "=== Recreating backend ==="
          docker compose -f docker-compose.yml -f docker-compose.vapid.yml up -d --force-recreate backend 2>&1 | tail -5

          # ── WAIT FOR BACKEND ─────────────────────────────────────────────────────
          echo "Waiting for backend to start..."
          for i in 1 2 3 4 5 6 7 8; do
            sleep 5
            STATUS=$(docker inspect slimpdv-backend --format '{{.State.Status}}' 2>/dev/null || echo "missing")
            if [ "$STATUS" = "running" ]; then
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
              echo "Attempt $i: container=$STATUS health=$HTTP"
              if [ "$HTTP" = "200" ]; then
                echo "Backend is UP"
                break
              fi
            else
              echo "Attempt $i: container=$STATUS"
            fi
          done

          # ── LOGS ─────────────────────────────────────────────────────────────────
          echo "=== Backend logs ==="
          docker logs slimpdv-backend --tail 30 2>&1 || true

          # ── START FRONTEND ────────────────────────────────────────────────────────
          echo "=== Starting frontend ==="
          docker compose up -d frontend 2>&1 | tail -3
          sleep 3

          # ── SMOKE TESTS ──────────────────────────────────────────────────────────
          docker ps --filter name=slimpdv --format "{{.Names}}: {{.Status}}"

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || echo "000")
          VAPID_HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/push/vapid-public-key 2>/dev/null || echo "000")
          VAPID_BODY=$(curl -s http://localhost:5000/api/push/vapid-public-key 2>/dev/null || echo "unreachable")
          echo "Health check: HTTP $HEALTH"
          echo "VAPID direct: HTTP $VAPID_HTTP — $VAPID_BODY"

          FRONT=$(curl -s -o /dev/null -w "%{http_code}" https://pdvslim.com.br/ 2>/dev/null || echo "000")
          VAPID_NGINX=$(curl -s -o /dev/null -w "%{http_code}" https://pdvslim.com.br/api/push/vapid-public-key 2>/dev/null || echo "000")
          echo "Frontend via nginx: HTTP $FRONT"
          echo "VAPID via nginx: HTTP $VAPID_NGINX"
          ENDSSH

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet || git commit -m "chore: bump to v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push
