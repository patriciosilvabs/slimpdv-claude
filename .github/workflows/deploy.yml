name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          parts = str(d['version']).split('.')
          d['version'] = '{}.{}'.format(parts[0], int(parts[1])+1)
          with open('version.json','w') as f:
              json.dump(d, f)
          print(d['version'])
          " > /tmp/new_version.txt
          echo "VERSION=$(cat /tmp/new_version.txt)" >> $GITHUB_OUTPUT
          echo "Bumped to v$(cat /tmp/new_version.txt)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 72.61.25.92 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload files to VPS
        run: |
          rsync -az --delete src/ root@72.61.25.92:/var/www/slimpdv/src/ -e "ssh -i ~/.ssh/vps_key"
          rsync -az patches/ root@72.61.25.92:/var/www/slimpdv/patches/ -e "ssh -i ~/.ssh/vps_key"
          rsync -az backend/src/ root@72.61.25.92:/var/www/slimpdv/backend/src/ -e "ssh -i ~/.ssh/vps_key"
          scp -i ~/.ssh/vps_key version.json root@72.61.25.92:/var/www/slimpdv/version.json

      - name: Run DB migrations
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 '
          echo "Running DB migrations..."
          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'gerente'"'"';" \
            -c "ALTER TYPE app_role ADD VALUE IF NOT EXISTS '"'"'supervisor'"'"';" \
            && echo "Role migrations done." || echo "Role migrations skipped."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_updated_at() RETURNS TRIGGER AS \$f\$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_updated_at ON orders;" \
            -c "CREATE TRIGGER orders_set_updated_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_updated_at();"
          echo "updated_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION set_order_ready_at() RETURNS TRIGGER AS \$f\$ BEGIN IF NEW.status = '"'"'ready'"'"' AND (OLD.status IS DISTINCT FROM '"'"'ready'"'"') THEN NEW.ready_at = NOW(); END IF; RETURN NEW; END; \$f\$ LANGUAGE plpgsql;" \
            -c "DROP TRIGGER IF EXISTS orders_set_ready_at ON orders;" \
            -c "CREATE TRIGGER orders_set_ready_at BEFORE UPDATE ON orders FOR EACH ROW EXECUTE FUNCTION set_order_ready_at();"
          echo "ready_at trigger done."

          docker exec slimpdv-postgres psql -U slimpdv -d slimpdv \
            -c "CREATE OR REPLACE FUNCTION check_order_completion(_order_id uuid) RETURNS boolean AS \$f\$ DECLARE v_tenant_id uuid; v_total int; v_ready int; BEGIN SELECT tenant_id INTO v_tenant_id FROM orders WHERE id = _order_id; IF v_tenant_id IS NULL THEN RETURN false; END IF; SELECT COUNT(*) INTO v_total FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id; SELECT COUNT(*) INTO v_ready FROM order_items WHERE order_id = _order_id AND tenant_id = v_tenant_id AND station_status = '"'"'ready'"'"'; IF v_total > 0 AND v_total = v_ready THEN UPDATE orders SET status = '"'"'ready'"'"', updated_at = NOW(), ready_at = NOW() WHERE id = _order_id AND tenant_id = v_tenant_id; RETURN true; END IF; RETURN false; END; \$f\$ LANGUAGE plpgsql;"
          echo "DB function/trigger migrations done."
          '

      - name: Build and deploy
        run: |
          ssh -i ~/.ssh/vps_key root@72.61.25.92 bash << 'ENDSSH'
          set -e
          cd /var/www/slimpdv

          # ── GENERATE VAPID KEYS ──────────────────────────────────────────────────
          if [ ! -f /var/www/slimpdv/vapid-keys.json ]; then
            node -e 'try{const c=require("crypto");const{privateKey:pk,publicKey:pub}=c.generateKeyPairSync("ec",{namedCurve:"prime256v1"});const pd=pub.export({type:"spki",format:"der"});const rd=pk.export({type:"pkcs8",format:"der"});const b=x=>Buffer.from(x).toString("base64").replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");process.stdout.write(JSON.stringify({publicKey:b(pd.slice(27)),privateKey:b(rd.slice(-32))}))}catch(e){process.stdout.write(JSON.stringify({publicKey:"",privateKey:""}))}' > /var/www/slimpdv/vapid-keys.json
            echo "VAPID keys generated"
          fi
          VAPID_PUB=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').publicKey)")
          VAPID_PRIV=$(node -e "process.stdout.write(require('/var/www/slimpdv/vapid-keys.json').privateKey)")
          echo "VAPID public key: ${VAPID_PUB:0:20}..."

          # ── GENERATE docker-compose.vapid.yml (env vars only — no volume hacks) ──
          printf 'services:\n  backend:\n    environment:\n      VAPID_PUBLIC_KEY: "%s"\n      VAPID_PRIVATE_KEY: "%s"\n      VAPID_EMAIL: "mailto:admin@pdvslim.com.br"\n' \
            "$VAPID_PUB" "$VAPID_PRIV" > /var/www/slimpdv/docker-compose.vapid.yml

          # ── BUILD IMAGES ─────────────────────────────────────────────────────────
          echo "=== Building backend image ==="
          docker compose build --no-cache backend 2>&1 | tail -10

          echo "=== Building frontend image ==="
          docker compose build frontend 2>&1 | tail -5

          # ── RECREATE BACKEND (TypeScript server with VAPID built-in) ─────────────
          echo "=== Recreating backend ==="
          docker compose -f docker-compose.yml -f docker-compose.vapid.yml up -d --force-recreate backend 2>&1 | tail -5

          # ── WAIT FOR BACKEND ─────────────────────────────────────────────────────
          echo "Waiting for backend to start..."
          for i in 1 2 3 4 5 6 7 8; do
            sleep 5
            STATUS=$(docker inspect slimpdv-backend --format '{{.State.Status}}' 2>/dev/null || echo "missing")
            if [ "$STATUS" = "running" ]; then
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null || echo "000")
              echo "Attempt $i: container=$STATUS health=$HTTP"
              if [ "$HTTP" = "200" ]; then
                echo "Backend is UP"
                break
              fi
            else
              echo "Attempt $i: container=$STATUS"
            fi
          done

          # ── LOGS ─────────────────────────────────────────────────────────────────
          echo "=== Backend logs ==="
          docker logs slimpdv-backend --tail 30 2>&1 || true

          # ── START FRONTEND ────────────────────────────────────────────────────────
          echo "=== Starting frontend ==="
          docker compose up -d frontend 2>&1 | tail -3
          sleep 3

          # ── SMOKE TESTS ──────────────────────────────────────────────────────────
          docker ps --filter name=slimpdv --format "{{.Names}}: {{.Status}}"

          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || echo "000")
          VAPID_HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/push/vapid-public-key 2>/dev/null || echo "000")
          VAPID_BODY=$(curl -s http://localhost:5000/api/push/vapid-public-key 2>/dev/null || echo "unreachable")
          echo "Health check: HTTP $HEALTH"
          echo "VAPID direct: HTTP $VAPID_HTTP — $VAPID_BODY"

          FRONT=$(curl -s -o /dev/null -w "%{http_code}" https://pdvslim.com.br/ 2>/dev/null || echo "000")
          VAPID_NGINX=$(curl -s -o /dev/null -w "%{http_code}" https://pdvslim.com.br/api/push/vapid-public-key 2>/dev/null || echo "000")
          echo "Frontend via nginx: HTTP $FRONT"
          echo "VAPID via nginx: HTTP $VAPID_NGINX"
          ENDSSH

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet || git commit -m "chore: bump to v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push
