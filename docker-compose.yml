version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: slimpdv-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-slimpdv}
      POSTGRES_USER: ${DB_USER:-slimpdv}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-slimpdv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slimpdv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slimpdv-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-slimpdv}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-slimpdv}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-https://www.pdvslim.com.br}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - slimpdv-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        VITE_API_URL: ${VITE_API_URL:-https://www.pdvslim.com.br/api}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://placeholder.supabase.co}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-placeholder-key}
    container_name: slimpdv-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - slimpdv-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  slimpdv-network:
    driver: bridge
